<div id="game-message"></div>

<!-- Full-screen colour tint that warms from blue → red as the player closes in -->
<div id="temperature-glow"></div>

<!-- Hidden card store — populated by cardCollection.js -->
<div id="collected-cards" style="display:none;"></div>

<div id="map"></div>

<!-- Bottom-left: silhouette teaser (above the trainer button) -->
<div id="pokemon-silhouette-teaser">
    <span class="silhouette-label">👀 Who's hiding?</span>
    <img id="silhouette-img" src="" alt="???" />
    <span class="silhouette-question">? ? ?</span>
</div>

<!-- Bottom-left: Pokémon helper button -->
<button id="fullscreen-btn" title="Meet your Pokémon Friend"
        style="font-size:16px;position:fixed;bottom:24px;left:24px;z-index:1000;background:rgba(192,57,43,0.75);border:2px solid rgba(255,215,0,0.6);border-radius:50%;box-shadow:0 2px 12px rgba(0,0,0,0.55);width:5rem;height:5rem;display:flex;align-items:center;justify-content:center;cursor:pointer;">
    <img src="pikachu-teo.png" alt="Pokémon Trainer" style="width:4.5em;height:auto;border-radius:5em;image-rendering:pixelated;">
</button>

<!-- Top-right HUD cluster -->
<div id="top-right-hud">
    <button id="profile-btn" class="hud-btn" title="My Pokémon Collection">
        <span style="font-size:1.5rem;">⚽</span>
    </button>
    <button id="settings-btn" class="hud-btn" title="Settings">
        <span style="font-size:1.5rem;">⚙️</span>
    </button>
    <button id="signout-btn" class="hud-btn" title="Sign Out">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/94.png"
             alt="Sign Out" style="width:2.4rem;height:auto;image-rendering:pixelated;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.5));">
    </button>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="game-modal-overlay">
    <div class="game-modal-card">
        <button class="game-modal-close" id="close-settings-btn">&times;</button>
        <h2 class="game-modal-title">⚙️ Settings</h2>

        <div class="game-setting-row">
            <label class="game-setting-label">⚽ Pokéball Search Radius</label>
            <select id="in-game-radius-select" class="settings-select">
                <option value="20">Tiny – 20 m (extreme!)</option>
                <option value="50">Small – 50 m</option>
                <option value="100">Medium – 100 m</option>
                <option value="150">Normal – 150 m</option>
                <option value="300">Large – 300 m</option>
                <option value="500">Huge – 500 m</option>
            </select>
            <p class="settings-hint" style="color:#96281b;">Applies to the <strong>next</strong> Pokéball placed.</p>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div id="profile-modal" class="game-modal-overlay">
    <div class="game-modal-card">
        <button class="game-modal-close" id="close-profile-btn">&times;</button>
        <div id="profile-user-row">
            <img id="profile-avatar" src="" alt="Avatar" style="display:none;width:3.5rem;height:3.5rem;border-radius:50%;object-fit:cover;border:3px solid #FFD700;">
            <div>
                <div id="profile-username" style="font-size:1.1rem;font-weight:bold;color:#7f0000;"></div>
                <div id="profile-stats" style="font-size:0.85rem;color:#c0392b;"></div>
            </div>
        </div>
        <h3 class="game-modal-title" style="margin-top:1rem;">🎮 My Pokémon Collection</h3>
        <div id="profile-cards-grid"></div>
        <p id="profile-empty-msg" style="text-align:center;color:#c0392b;font-size:0.9rem;display:none;">No Pokémon yet — go find some Pokéballs! ⚽</p>
    </div>
</div>

<!-- Pokémon trainer intro modal -->
<div id="dino-collector-modal" class=""
     style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.75);z-index:10000;justify-content:center;align-items:center;flex-direction:column;">
    <div class="speech-bubble">
        Hi, I'm your Pokémon Trainer friend!<br>
        Let's find Pokéballs and catch Pokémon together!
    </div>
    <img src="wave-dino-collector.png" alt="Pokémon Trainer" style="width:180px;height:auto;border-radius:16px;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.4));"/>
    <button id="close-dino-modal-btn"
            style="margin-top:24px;font-size:18px;background:#FFD700;color:#7f0000;border:none;border-radius:14px;padding:12px 32px;font-weight:900;box-shadow:0 2px 16px rgba(255,215,0,0.4);cursor:pointer;letter-spacing:0.5px;">
        Let's go! ⚽
    </button>
</div>

<!-- Cloud overlay -->
<div id="cloud-overlay"
     style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;">
    <img class="cloud cloud1" src="clouds.png"/>
    <img class="cloud cloud2" src="clouds.png"/>
    <img class="cloud cloud3" src="clouds.png"/>
    <img class="cloud cloud4" src="clouds.png"/>
    <img class="cloud cloud5" src="clouds.png"/>
    <img class="cloud cloud6" src="clouds.png"/>
    <img class="cloud cloud7" src="clouds.png"/>
    <img class="cloud cloud8" src="clouds.png"/>
</div>

<!-- Screen-edge directional arrow overlay -->
<div id="screen-arrow-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:500;">
    <div id="screen-edge-arrow" style="display:none;position:absolute;pointer-events:none;width:48px;height:48px;">
        <svg viewBox="0 0 48 48" width="48" height="48">
            <polygon points="24,4 36,24 30,24 30,44 18,44 18,24 12,24" fill="#FFD700" stroke="#c0392b" stroke-width="2.5" stroke-linejoin="round"/>
        </svg>
    </div>
</div>

<!-- Pokémon card celebration -->
<div id="t-rex-celebration"
     style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.75);z-index:9999;justify-content:center;align-items:center;flex-direction:column;">
    <canvas id="fireworks-canvas" style="position:absolute;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:1;"></canvas>
    <img src="" alt="Pokémon" style="width:300px;position:relative;z-index:2;filter:drop-shadow(0 0 32px rgba(255,215,0,0.8));"/>
    <button id="close-card-btn" style="position:fixed;top:24px;right:24px;font-size:2.5rem;background:rgba(192,57,43,0.85);border:2px solid rgba(255,215,0,0.7);border-radius:50%;width:3.5rem;height:3.5rem;color:white;cursor:pointer;z-index:10002;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 12px rgba(0,0,0,0.5);">&times;</button>
</div>

<!-- Card zoom modal -->
<div id="card-modal"
     style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.75);z-index:10000;justify-content:center;align-items:center;flex-direction:column;">
    <img id="modal-card-img" src="" alt="Collected Pokémon"
         style="max-width:80vw;max-height:80vh;border-radius:20px;box-shadow:0 2px 32px rgba(255,215,0,0.5),0 0 0 3px #FFD700;"/>
    <button id="close-modal-btn"
            style="margin-top:24px;font-size:18px;background:#FFD700;color:#7f0000;border:none;border-radius:14px;padding:12px 32px;font-weight:900;box-shadow:0 2px 16px rgba(255,215,0,0.4);cursor:pointer;">
        Close
    </button>
</div>
