<!-- Moved from src/components/game/game.html for Vite compatibility -->
<div id="game-message"></div>

<!-- Hidden card store — populated by showCard.js -->
<div id="collected-cards" style="display:none;"></div>

<div id="map"></div>

<!-- Bottom-left: Pokémon helper button -->
<button id="fullscreen-btn" title="Meet your Pokémon Friend"
        style="font-size:16px;position:fixed;bottom:24px;left:24px;z-index:1000;background:rgba(255,255,255,0.14);border:none;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.55);width:5rem;height:5rem;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;padding:0;">
    <img src="pikachu-teo.png" alt="Pokémon Trainer" style="width:4.2rem;height:4.2rem;object-fit:cover;border-radius:50%;display:block;">
</button>

<!-- Top-right HUD cluster -->
<div id="top-right-hud">
    <button id="profile-btn" class="hud-btn" title="My Pokémon Collection">
        <span style="font-size:1.5rem;">⚽</span>
    </button>
    <button id="signout-btn" class="hud-btn" title="Sign Out">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/63.png"
             alt="Sign Out" style="width:2.4rem;height:2.4rem;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.5));">
    </button>
</div>

<!-- Profile Modal -->
<div id="profile-modal" class="game-modal-overlay">
    <div class="game-modal-card">
        <button class="game-modal-close" id="close-profile-btn">&times;</button>
        <div id="profile-user-row">
            <img id="profile-avatar" src="" alt="Avatar" style="display:none;width:3.5rem;height:3.5rem;border-radius:50%;object-fit:cover;border:3px solid #c8a86b;">
            <div>
                <div id="profile-username" style="font-size:1.1rem;font-weight:bold;color:#382110;"></div>
                <div id="profile-stats" style="font-size:0.85rem;color:#7a5c1e;"></div>
            </div>
        </div>
        <h3 class="game-modal-title" style="margin-top:1rem;">🎮 My Pokémon Collection</h3>
        <div id="profile-cards-grid"></div>
        <p id="profile-empty-msg" style="text-align:center;color:#c0392b;font-size:0.9rem;display:none;">No Pokémon yet — go find some Pokéballs! ⚽</p>
    </div>
</div>

<!-- Dino friend modal -->
<div id="dino-collector-modal"
     style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);z-index:10000;justify-content:center;align-items:center;flex-direction:column;">
    <div class="speech-bubble">
        Hi, I'm your Pokémon Trainer friend!<br>
        Let's find Pokéballs and catch Pokémon together!
    </div>
    <img src="wave-dino-collector.png" alt="Pokémon Trainer" style="width:180px;height:auto;border-radius:16px;"/>
    <button id="close-dino-modal-btn"
            style="margin-top:24px;font-size:18px;background:rgba(252,237,195,0.95);color:#382110;border:none;border-radius:10px;padding:12px 32px;font-weight:bold;box-shadow:0 2px 12px rgba(0,0,0,0.2);cursor:pointer;">
        Let's go! ⚽
    </button>
</div>

<!-- Cloud overlay -->
<div id="cloud-overlay"
     style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;">
    <img class="cloud cloud1" src="clouds.png" alt=""/>
    <img class="cloud cloud2" src="clouds.png" alt=""/>
    <img class="cloud cloud3" src="clouds.png" alt=""/>
    <img class="cloud cloud4" src="clouds.png" alt=""/>
    <img class="cloud cloud5" src="clouds.png" alt=""/>
    <img class="cloud cloud6" src="clouds.png" alt=""/>
    <img class="cloud cloud7" src="clouds.png" alt=""/>
    <img class="cloud cloud8" src="clouds.png" alt=""/>
</div>

<!-- Screen-edge arrow removed — heading-up map rotation used instead -->

<!-- Card celebration -->
<div id="t-rex-celebration"
     style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);z-index:9999;justify-content:center;align-items:center;flex-direction:column;">
    <canvas id="fireworks-canvas" style="position:absolute;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:1;"></canvas>
    <img src="" alt="T-Rex" style="width:300px;position:relative;z-index:2;"/>
    <button id="close-card-btn" style="position:fixed;top:24px;right:24px;font-size:2.5rem;background:rgba(30,20,10,0.85);border:2px solid rgba(255,255,255,0.6);border-radius:50%;width:3.5rem;height:3.5rem;color:white;cursor:pointer;z-index:10002;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 12px rgba(0,0,0,0.5);">&times;</button>
</div>

<!-- Card zoom modal -->
<div id="card-modal"
     style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);z-index:10000;justify-content:center;align-items:center;flex-direction:column;">
    <img id="modal-card-img" src="" alt="Collected Card"
         style="max-width:80vw;max-height:80vh;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,0.4);"/>
    <button id="close-modal-btn"
            style="margin-top:24px;font-size:18px;background:rgba(252,237,195,0.95);color:#382110;border:none;border-radius:10px;padding:12px 32px;font-weight:bold;box-shadow:0 2px 12px rgba(0,0,0,0.2);cursor:pointer;">
        Close
    </button>
</div>
